<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rileyglot</title>
    <link rel="icon" href="assets/osrshead.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="main-window">
        <img id="make-main-correct" class="always-top-layer" src="assets/mainwindow.png" />
        <div id="main-section">
            <div id="main-content">
                <div id="filler-text">
                    <h2>SE SEI KOE IKIIKI</h2>
                </div>   
            </div>
        </div>
    </div>
    <div id="top-banner">
        <img id="top-logo" src="assets/logo-with-image.png" />
        <img id="osaka" src="assets/osakpup-alsdhpvp27826.png" onclick="osaka_clicked()"/>

    </div>
    <div id="woodcut-game">
        <p id="wood-count-text">Total wood: 0</p>
        <img class="always-top-layer make-image-correct" src="assets/runecutwindow.png" />
        <img id="woodguy-static" src="assets/woodcutguy.png" alt="Click to chop wood" onclick="chop()" />
        <img id="woodguy-cutting" src="assets/200px-Felling_axe.gif" />
    </div>
    <div id="kin-list-section">
        <img class="always-top-layer make-image-correct" src="assets/mykinlistwindow.png" />
        <div id="kin-list-container">
            <img class="kin-list-image" id="bonnie" src="assets/kin-list-bonnie.webp" onclick="bonnie_clicked()" />
            <img class="kin-list-image" src="assets/kin-list-rosa.jpg" />
            <img class="kin-list-image" src="assets/kin-list-asgore.png" />
            <img class="kin-list-image" src="assets/kin-list-gardevoir.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-steve.png" />
            <img class="kin-list-image" src="assets/kin-list-ganondorf.png" />
            <img class="kin-list-image" src="assets/kin-list-sakaki.jpg" />
            <img class="kin-list-image" src="assets/kin-list-mauga.webp" />
        </div>
    </div>
    <div id="blink-top"></div>
    <div id="blink-bottom"></div>
    <script src="script.js"></script>
</body>
</html>
