<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rileyglot</title>
    <link rel="icon" href="assets/osrshead.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top-banner">
        <div id="main-logo">
            <img src="assets/logo-with-image.png" />
        </div>
        <div id="osaka">
            <img src="assets/osakpup-alsdhpvp27826.png" onclick="osaka_clicked()"/>
        </div>
    </div>
    <div id="woodcut-game">
        <p id="wood-count-text">Total wood: 0</p>
        <img class="always-top-layer" src="assets/runecutwindow.png" />
        <img id="woodguy-static" src="assets/woodcutguy.png" alt="Click to chop wood" onclick="chop()" />
        <img id="woodguy-cutting" src="assets/200px-Felling_axe.gif" />
    </div>
    <div id="kin-list-section">
        <img class="always-top-layer" src="assets/mykinlistwindow.png" />
        <div id="kin-list-container">
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-asgore.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
            <img class="kin-list-image" src="assets/kin-list-osaka.png" />
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
